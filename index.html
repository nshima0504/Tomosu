<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tomosu</title>

<!-- ---- 圖示設定 ----
  之後把對應檔名的圖片放進跟這個html同一層的GitHub Page資料夾即可生效，不需要再改程式碼。
  favicon.png   ：瀏覽器分頁標籤、書籤列表會用到的小圖示，建議至少32x32px
  icon.png      ：iOS「加入主畫面」時顯示在手機桌面的圖示，建議180x180px、四角不要先做圓角（iOS會自動裁切）
-->
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Tomosu">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#232325">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-color: #232325;
    --card-bg: rgba(255,255,255,0.08);
    --card-border: rgba(255,255,255,0.16);
    --card-shadow: 0 8px 32px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.12);
    --text-primary: #f5f5f7;
    --text-secondary: rgba(245,245,247,0.6);
    --text-tertiary: rgba(245,245,247,0.4);
    --control-bg: rgba(255,255,255,0.06);
    --control-bg-hover: rgba(255,255,255,0.12);
    --control-border: rgba(255,255,255,0.15);
    --icon-stroke: rgba(245,245,247,0.6);
    --modal-bg: rgba(255,255,255,0.1);
    --modal-border: rgba(255,255,255,0.18);
    --input-bg: rgba(255,255,255,0.08);
    --input-border: rgba(255,255,255,0.15);
    --button-bg: rgba(255,255,255,0.06);
    --button-border: rgba(255,255,255,0.15);
    --button-primary-bg: rgba(255,255,255,0.18);
  }

  @media (prefers-color-scheme: light) {
    :root:not([data-theme="dark"]) {
      --bg-color: #e6e8eb;
      --card-bg: rgba(255,255,255,0.55);
      --card-border: rgba(0,0,0,0.08);
      --card-shadow: 0 8px 32px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.6);
      --text-primary: #1c1c1e;
      --text-secondary: rgba(28,28,30,0.55);
      --text-tertiary: rgba(28,28,30,0.38);
      --control-bg: rgba(0,0,0,0.04);
      --control-bg-hover: rgba(0,0,0,0.08);
      --control-border: rgba(0,0,0,0.1);
      --icon-stroke: rgba(28,28,30,0.6);
      --modal-bg: rgba(255,255,255,0.65);
      --modal-border: rgba(0,0,0,0.08);
      --input-bg: rgba(0,0,0,0.04);
      --input-border: rgba(0,0,0,0.1);
      --button-bg: rgba(0,0,0,0.04);
      --button-border: rgba(0,0,0,0.1);
      --button-primary-bg: rgba(0,0,0,0.1);
    }
  }

  :root[data-theme="light"] {
    --bg-color: #e6e8eb;
    --card-bg: rgba(255,255,255,0.55);
    --card-border: rgba(0,0,0,0.08);
    --card-shadow: 0 8px 32px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.6);
    --text-primary: #1c1c1e;
    --text-secondary: rgba(28,28,30,0.55);
    --text-tertiary: rgba(28,28,30,0.38);
    --control-bg: rgba(0,0,0,0.04);
    --control-bg-hover: rgba(0,0,0,0.08);
    --control-border: rgba(0,0,0,0.1);
    --icon-stroke: rgba(28,28,30,0.6);
    --modal-bg: rgba(255,255,255,0.65);
    --modal-border: rgba(0,0,0,0.08);
    --input-bg: rgba(0,0,0,0.04);
    --input-border: rgba(0,0,0,0.1);
    --button-bg: rgba(0,0,0,0.04);
    --button-border: rgba(0,0,0,0.1);
    --button-primary-bg: rgba(0,0,0,0.1);
  }

  /* ---- 卡片熄滅色調（低飽和，保留色彩識別但不發光） ---- */
  [data-color="red"]    { --card-tint: rgba(201,127,127,0.22); --card-tint-border: rgba(201,127,127,0.32); --tint-solid: #c97f7f; }
  [data-color="orange"] { --card-tint: rgba(207,156,110,0.22); --card-tint-border: rgba(207,156,110,0.32); --tint-solid: #cf9c6e; }
  [data-color="yellow"] { --card-tint: rgba(205,187,126,0.22); --card-tint-border: rgba(205,187,126,0.32); --tint-solid: #cdbb7e; }
  [data-color="blue"]   { --card-tint: rgba(141,163,189,0.22); --card-tint-border: rgba(141,163,189,0.32); --tint-solid: #8da3bd; }

  @media (prefers-color-scheme: light) {
    :root:not([data-theme="dark"]) [data-color="red"]    { --card-tint: rgba(214,128,128,0.42); --card-tint-border: rgba(190,104,104,0.32); }
    :root:not([data-theme="dark"]) [data-color="orange"] { --card-tint: rgba(224,172,116,0.42); --card-tint-border: rgba(200,142,90,0.32); }
    :root:not([data-theme="dark"]) [data-color="yellow"] { --card-tint: rgba(224,200,118,0.42); --card-tint-border: rgba(202,176,90,0.32); }
    :root:not([data-theme="dark"]) [data-color="blue"]   { --card-tint: rgba(140,166,196,0.42); --card-tint-border: rgba(112,142,176,0.32); }
  }
  :root[data-theme="light"] [data-color="red"]    { --card-tint: rgba(214,128,128,0.42); --card-tint-border: rgba(190,104,104,0.32); }
  :root[data-theme="light"] [data-color="orange"] { --card-tint: rgba(224,172,116,0.42); --card-tint-border: rgba(200,142,90,0.32); }
  :root[data-theme="light"] [data-color="yellow"] { --card-tint: rgba(224,200,118,0.42); --card-tint-border: rgba(202,176,90,0.32); }
  :root[data-theme="light"] [data-color="blue"]   { --card-tint: rgba(140,166,196,0.42); --card-tint-border: rgba(112,142,176,0.32); }

  /* 熄滅：色調疊加在玻璃底色上，維持高光與透明度 */
  .card[data-color] {
    background: linear-gradient(var(--card-tint), var(--card-tint)), var(--card-bg);
    border-color: var(--card-tint-border);
  }
  .modal[data-color] {
    background: linear-gradient(var(--card-tint), var(--card-tint)), var(--modal-bg);
    border-color: var(--card-tint-border);
    transition: background 0.2s ease, border-color 0.2s ease;
  }

  /* 點亮疊色濃度與暈影強度：深色模式下的預設值 */
  [data-color="red"]    { --lit-tint: rgba(201,127,127,0.55); --lit-glow: rgba(201,127,127,0.32); }
  [data-color="orange"] { --lit-tint: rgba(207,156,110,0.55); --lit-glow: rgba(207,156,110,0.32); }
  [data-color="yellow"] { --lit-tint: rgba(205,187,126,0.55); --lit-glow: rgba(205,187,126,0.32); }
  [data-color="blue"]   { --lit-tint: rgba(141,163,189,0.55); --lit-glow: rgba(141,163,189,0.32); }

  /* 淺色模式：不透明度只比深色模式略高，留住底層玻璃的白霧透光感，
     對比則靠暈影擴散範圍加大來補，而不是用顏色完全蓋掉玻璃感 */
  @media (prefers-color-scheme: light) {
    :root:not([data-theme="dark"]) [data-color="red"]    { --lit-tint: rgba(196,90,90,0.62); --lit-glow: rgba(196,90,90,0.45); }
    :root:not([data-theme="dark"]) [data-color="orange"] { --lit-tint: rgba(204,132,70,0.62); --lit-glow: rgba(204,132,70,0.45); }
    :root:not([data-theme="dark"]) [data-color="yellow"] { --lit-tint: rgba(198,168,70,0.62); --lit-glow: rgba(198,168,70,0.45); }
    :root:not([data-theme="dark"]) [data-color="blue"]   { --lit-tint: rgba(96,128,168,0.62); --lit-glow: rgba(96,128,168,0.45); }
  }
  :root[data-theme="light"] [data-color="red"]    { --lit-tint: rgba(196,90,90,0.62); --lit-glow: rgba(196,90,90,0.45); }
  :root[data-theme="light"] [data-color="orange"] { --lit-tint: rgba(204,132,70,0.62); --lit-glow: rgba(204,132,70,0.45); }
  :root[data-theme="light"] [data-color="yellow"] { --lit-tint: rgba(198,168,70,0.62); --lit-glow: rgba(198,168,70,0.45); }
  :root[data-theme="light"] [data-color="blue"]   { --lit-tint: rgba(96,128,168,0.62); --lit-glow: rgba(96,128,168,0.45); }

  /* 點亮：卡片本體飽和度提升、邊框轉為實色，外圍補上一圈柔和的暈影；
     淺色模式的暈影擴散半徑略放大，補足玻璃透光後對比變弱的部分 */
  .card.is-lit[data-color] {
    background: linear-gradient(var(--lit-tint), var(--lit-tint)), var(--card-bg);
    border-color: var(--tint-solid);
    box-shadow: var(--card-shadow), 0 0 14px 1px var(--lit-glow);
  }
  @media (prefers-color-scheme: light) {
    :root:not([data-theme="dark"]) .card.is-lit[data-color] {
      box-shadow: var(--card-shadow), 0 0 20px 2px var(--lit-glow);
    }
  }
  :root[data-theme="light"] .card.is-lit[data-color] {
    box-shadow: var(--card-shadow), 0 0 20px 2px var(--lit-glow);
  }

  html {
    height: 100%;
    background: var(--bg-color);
    transition: background 0.3s ease;
  }

  body {
    min-height: 100%;
    font-family: -apple-system, "SF Pro Display", "PingFang TC", "Noto Sans TC", sans-serif;
    color: var(--text-primary);
    display: flex;
    justify-content: center;
    padding: 40px 16px;
  }

  .page { width: 100%; max-width: 560px; }

  .page-header {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 24px;
  }

  .habits {
    width: 100%;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 24px;
  }

  /* ---- 卡片本體：液態玻璃 ---- */
  .card {
    position: relative;
    width: 100%;
    border: 1px solid var(--card-border);
    border-radius: 32px;
    backdrop-filter: blur(24px) saturate(160%);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    box-shadow: var(--card-shadow);
    transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease, transform 0.2s ease;
    display: flex;
    flex-direction: column;
    cursor: pointer;
    user-select: none;
  }
  .card:active { transform: scale(0.97); }

  .card.is-large { grid-column: 1 / -1; min-height: 220px; }
  .card.is-small { grid-column: span 1; min-height: 180px; }

  .card-header {
    position: absolute;
    top: 20px;
    right: 20px;
    z-index: 1;
  }
  .card.is-small .card-header { right: 14px; }

  .card-edit-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid var(--control-border);
    background: var(--control-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, border-color 0.2s;
  }
  .card-edit-btn:hover { background: var(--control-bg-hover); }
  .card-edit-btn svg { width: 14px; height: 14px; }
  .card-edit-btn circle {
    stroke: var(--icon-stroke);
    stroke-width: 1.8;
    fill: var(--icon-stroke);
  }

  .card-title-row {
    position: absolute;
    top: 20px;
    left: 0;
    right: 0;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 40px;
    pointer-events: none;
  }
  .card.is-small .card-title-row { padding: 0 20px; }

  .card-body {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 0 24px;
  }
  .card.is-small .card-body { padding: 0 16px; }

  .habit-name {
    font-size: 16px;
    font-weight: 500;
    text-align: center;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }
  .card.is-small .habit-name { font-size: 14px; }

  .habit-days-row {
    display: flex;
    width: 100%;
    align-items: baseline;
    justify-content: center;
    gap: 8px;
    margin-top: 4px;
  }
  .habit-days { font-size: 56px; font-weight: 600; letter-spacing: -1px; color: var(--text-primary); }
  .card.is-small .habit-days { font-size: 36px; }
  .habit-unit { font-size: 15px; color: var(--text-secondary); }
  .card.is-small .habit-unit { font-size: 13px; }

  /* ---- 拖曳把手 ---- */
  .drag-handle {
    position: absolute;
    left: 50%;
    bottom: 10px;
    transform: translateX(-50%);
    display: flex;
    justify-content: center;
    padding: 6px;
    cursor: grab;
    touch-action: none;
    z-index: 1;
  }
  .drag-handle svg { width: 24px; height: 12px; }
  .drag-handle circle { fill: var(--text-tertiary); transition: fill 0.2s; }
  .drag-handle:hover circle { fill: var(--text-secondary); }
  .card.dragging .drag-handle { cursor: grabbing; }
  .card.dragging .drag-handle circle { fill: var(--text-secondary); }

  .card.dragging {
    position: fixed;
    margin: 0;
    transition: none !important;
    transform: scale(1.03);
    z-index: 100;
    box-shadow: 0 16px 48px rgba(0,0,0,0.32);
    cursor: grabbing;
    user-select: none;
    touch-action: none;
    pointer-events: none;
  }

  .card-placeholder {
    background: transparent;
    border: 1px dashed var(--card-border);
    box-shadow: none;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    pointer-events: none;
  }

  .glass-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid var(--control-border);
    background: var(--control-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .glass-btn:hover { background: var(--control-bg-hover); }
  .glass-btn svg { width: 18px; height: 18px; }
  .glass-btn path, .glass-btn circle, .glass-btn line {
    stroke: var(--icon-stroke);
    stroke-width: 1.8;
    stroke-linecap: round;
    fill: none;
  }

  .theme-toggle .icon-sun, .theme-toggle .icon-moon { display: none; }
  .theme-toggle.is-light .icon-sun { display: block; }
  .theme-toggle:not(.is-light) .icon-moon { display: block; }

  /* ---- 新增卡片按鈕：跟卡片同一套圓角語言，但用虛線標示「尚未存在」 ---- */
  .add-card {
    grid-column: 1 / -1;
    border: 1px dashed var(--card-border);
    border-radius: 32px;
    background: transparent;
    box-shadow: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: 120px;
    color: var(--text-tertiary);
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .add-card:hover { border-color: var(--control-border); color: var(--text-secondary); }
  .add-card .add-icon { font-size: 30px; font-weight: 400; line-height: 1; }
  .add-card .add-label { font-size: 14px; }

  /* ---- modal ---- */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .overlay.hide { display: none; }

  .modal {
    position: relative;
    transform: translateZ(0);
    width: calc(100% - 80px);
    max-width: 420px;
    border: 1px solid var(--modal-border);
    border-radius: 24px;
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    padding: 36px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    background: var(--modal-bg);
  }
  .modal h3 { font-size: 19px; font-weight: 500; color: var(--text-primary); }
  .modal label { font-size: 14px; color: var(--text-secondary); }
  .modal input {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 12px;
    padding: 13px 14px;
    color: var(--text-primary);
    font-size: 16px;
    outline: none;
    margin-top: 6px;
    -webkit-appearance: none;
    appearance: none;
  }
  .field-error { font-size: 12px; color: #d98a8a; margin-top: 6px; line-height: 1.4; }
  .field-error.hide { display: none; }

  .color-picker { display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap; }
  .color-swatch {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    padding: 0;
    box-shadow: inset 0 0 0 1px var(--control-border);
    transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .color-swatch:hover { transform: scale(1.08); }
  .color-swatch.is-selected { border-color: var(--text-primary); }
  .color-swatch[data-color="red"]    { background: #c97f7f; }
  .color-swatch[data-color="orange"] { background: #cf9c6e; }
  .color-swatch[data-color="yellow"] { background: #cdbb7e; }
  .color-swatch[data-color="blue"]   { background: #8da3bd; }

  .size-picker { display: flex; gap: 10px; margin-top: 8px; }
  .size-swatch {
    padding: 10px 22px;
    border-radius: 12px;
    border: 1px solid var(--button-border);
    background: var(--button-bg);
    color: var(--text-secondary);
    font-size: 15px;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
  }
  .size-swatch:hover { background: var(--control-bg-hover); }
  .size-swatch.is-selected {
    background: var(--button-primary-bg);
    color: var(--text-primary);
    font-weight: 500;
    border-color: var(--text-primary);
  }

  .modal-buttons { display: flex; gap: 12px; margin-top: 6px; }
  .modal-buttons button {
    flex: 1;
    padding: 13px;
    border-radius: 12px;
    border: 1px solid var(--button-border);
    background: var(--button-bg);
    color: var(--text-primary);
    font-size: 15px;
    cursor: pointer;
  }
  .modal-buttons button.primary { background: var(--button-primary-bg); font-weight: 500; }
  .modal-buttons button.hide { display: none; }

  @media (max-width: 600px) {
    .card-body { padding: 0 18px; }
    .habit-days { font-size: 44px; }
    .card.is-small .habit-days { font-size: 30px; }
    .modal { padding: 28px 22px; }
  }
</style>
</head>
<body>

<div class="page">
  <div class="page-header">
    <button class="glass-btn theme-toggle" id="themeToggle" aria-label="切換深淺色模式" title="切換深淺色模式">
      <svg class="icon-sun" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="4"></circle>
        <line x1="12" y1="2" x2="12" y2="4"></line>
        <line x1="12" y1="20" x2="12" y2="22"></line>
        <line x1="4.93" y1="4.93" x2="6.34" y2="6.34"></line>
        <line x1="17.66" y1="17.66" x2="19.07" y2="19.07"></line>
        <line x1="2" y1="12" x2="4" y2="12"></line>
        <line x1="20" y1="12" x2="22" y2="12"></line>
        <line x1="4.93" y1="19.07" x2="6.34" y2="17.66"></line>
        <line x1="17.66" y1="6.34" x2="19.07" y2="4.93"></line>
      </svg>
      <svg class="icon-moon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>
  </div>

  <div class="habits" id="habitsContainer"></div>
</div>

<div class="overlay hide" id="habitOverlay">
  <div class="modal" id="habitModal">
    <h3 id="modalTitle">新增習慣</h3>
    <div>
      <label>習慣名稱</label>
      <input type="text" id="habitNameInput" placeholder="例如：喝水、運動、閱讀">
      <div class="field-error hide" id="nameError">名稱太長了，請縮短一些</div>
    </div>
    <div>
      <label>卡片顏色</label>
      <div class="color-picker" id="colorPicker">
        <button type="button" class="color-swatch is-selected" data-color="red"></button>
        <button type="button" class="color-swatch" data-color="orange"></button>
        <button type="button" class="color-swatch" data-color="yellow"></button>
        <button type="button" class="color-swatch" data-color="blue"></button>
      </div>
    </div>
    <div>
      <label>卡片大小</label>
      <div class="size-picker" id="sizePicker">
        <button type="button" class="size-swatch is-selected" data-size="large">大</button>
        <button type="button" class="size-swatch" data-size="small">小</button>
      </div>
    </div>
    <div>
      <label>基礎天數</label>
      <input type="number" id="baseDaysInput" placeholder="0">
      <div class="field-error hide" id="baseDaysError">基礎天數過多，請輸入小一點的數字</div>
    </div>
    <div class="modal-buttons">
      <button id="deleteBtn" class="hide">刪除</button>
      <button id="cancelBtn">取消</button>
      <button id="confirmBtn" class="primary">儲存</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'tomosu_habits_v1';
const THEME_KEY = 'tomosu_theme_v1';
const MAX_TOTAL_DAYS = 99999;

function loadHabits() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return [];
    return JSON.parse(raw);
  } catch (e) { return []; }
}

function saveHabits() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(habits)); } catch (e) {}
}

function todayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ---- 名稱字數限制：全形字算2單位、半形字算1單位，避免長標題撐爆卡片 ----
const CJK_REGEX = /[\u3000-\u303f\u3040-\u30ff\u3400-\u4dbf\u4e00-\u9fff\uac00-\ud7a3\uff00-\uffef]/;
const NAME_LIMIT_LARGE = 16;
const NAME_LIMIT_SMALL = 8;

function getWeightedLength(str) {
  let total = 0;
  for (const ch of str) total += CJK_REGEX.test(ch) ? 2 : 1;
  return total;
}
function nameLimitForSize(size) { return size === 'small' ? NAME_LIMIT_SMALL : NAME_LIMIT_LARGE; }
function nameExceedsLimit(name, size) { return getWeightedLength(name) > nameLimitForSize(size); }

let habits = loadHabits();
// 資料補齊：舊資料若沒有 size 欄位，預設為 large
habits.forEach(h => { if (!h.size) h.size = 'large'; });

let editingId = null;
let selectedColor = 'red';
let selectedSize = 'large';
let originalColor = 'red';
let originalSize = 'large';

const habitsContainer = document.getElementById('habitsContainer');
const overlay = document.getElementById('habitOverlay');
const habitModal = document.getElementById('habitModal');
const modalTitle = document.getElementById('modalTitle');
const nameInput = document.getElementById('habitNameInput');
const nameError = document.getElementById('nameError');
const baseDaysInput = document.getElementById('baseDaysInput');
const baseDaysError = document.getElementById('baseDaysError');
const colorPicker = document.getElementById('colorPicker');
const sizePicker = document.getElementById('sizePicker');
const deleteBtn = document.getElementById('deleteBtn');
const cancelBtn = document.getElementById('cancelBtn');
const confirmBtn = document.getElementById('confirmBtn');

function renderHabits() {
  const today = todayStr();
  habitsContainer.innerHTML = '';

  habits.forEach(habit => {
    const isLit = habit.dates.includes(today);
    const totalDays = (habit.baseDays || 0) + habit.dates.length;
    const card = document.createElement('div');
    card.className = `card ${habit.size === 'small' ? 'is-small' : 'is-large'}` + (isLit ? ' is-lit' : '');
    card.dataset.color = habit.color;
    card.dataset.id = habit.id;
    card.id = `card-${habit.id}`;
    card.innerHTML = `
      <div class="card-header">
        <div class="card-edit-btn" data-edit-id="${habit.id}">
          <svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.5"></circle><circle cx="12" cy="12" r="1.5"></circle><circle cx="19" cy="12" r="1.5"></circle></svg>
        </div>
      </div>
      <div class="card-title-row">
        <div class="habit-name">${escapeHtml(habit.name)}</div>
      </div>
      <div class="card-body">
        <div class="habit-days-row">
          <span class="habit-days">${totalDays}</span>
          <span class="habit-unit">天</span>
        </div>
      </div>
      <div class="drag-handle" title="拖曳排序">
        <svg viewBox="0 0 24 12" xmlns="http://www.w3.org/2000/svg">
          <circle cx="4" cy="3" r="1.5"></circle>
          <circle cx="12" cy="3" r="1.5"></circle>
          <circle cx="20" cy="3" r="1.5"></circle>
          <circle cx="4" cy="9" r="1.5"></circle>
          <circle cx="12" cy="9" r="1.5"></circle>
          <circle cx="20" cy="9" r="1.5"></circle>
        </svg>
      </div>
    `;
    habitsContainer.appendChild(card);
    attachDragHandlers(card, habit.id);
  });

  const addCard = document.createElement('div');
  addCard.className = 'add-card';
  addCard.id = 'addHabitBtn';
  addCard.innerHTML = `<span class="add-icon">+</span><span class="add-label">新增習慣</span>`;
  habitsContainer.appendChild(addCard);
}

// ---- 卡片本體點擊：點亮/熄滅。把手與編輯鈕各自攔截，不會誤觸 ----
habitsContainer.addEventListener('click', (e) => {
  if (e.target.closest('.drag-handle')) return;

  const editBtn = e.target.closest('.card-edit-btn');
  if (editBtn) { openEditModal(Number(editBtn.dataset.editId)); return; }

  const addBtn = e.target.closest('#addHabitBtn');
  if (addBtn) { openAddModal(); return; }

  const card = e.target.closest('.card');
  if (!card || card.classList.contains('dragging')) return;

  const id = Number(card.dataset.id);
  const habit = habits.find(h => h.id === id);
  if (!habit) return;

  const today = todayStr();
  const idx = habit.dates.indexOf(today);
  if (idx === -1) {
    const wouldBeTotal = (habit.baseDays || 0) + habit.dates.length + 1;
    if (wouldBeTotal > MAX_TOTAL_DAYS) return;
    habit.dates.push(today);
  } else {
    habit.dates.splice(idx, 1);
  }

  saveHabits();
  renderHabits();
});

// ---- modal ----
function openAddModal() {
  editingId = null;
  modalTitle.textContent = '新增習慣';
  nameInput.value = '';
  baseDaysInput.value = '';
  nameError.classList.add('hide');
  baseDaysError.classList.add('hide');
  setSelectedColor('red');
  setSelectedSize('large');
  deleteBtn.classList.add('hide');
  overlay.classList.remove('hide');
  nameInput.focus();
}

function openEditModal(id) {
  const habit = habits.find(h => h.id === id);
  if (!habit) return;
  editingId = id;
  originalColor = habit.color;
  originalSize = habit.size;
  modalTitle.textContent = '編輯習慣';
  nameInput.value = habit.name;
  baseDaysInput.value = habit.baseDays || 0;
  nameError.classList.add('hide');
  baseDaysError.classList.add('hide');
  setSelectedColor(habit.color);
  setSelectedSize(habit.size);
  deleteBtn.classList.remove('hide');
  overlay.classList.remove('hide');
}

function setSelectedColor(color) {
  selectedColor = color;
  colorPicker.querySelectorAll('.color-swatch').forEach(btn => {
    btn.classList.toggle('is-selected', btn.dataset.color === color);
  });
  habitModal.dataset.color = color;

  // 若是編輯既有習慣，即時把對應卡片的顏色也換過去，所見即所得
  if (editingId !== null) {
    const cardEl = document.getElementById(`card-${editingId}`);
    if (cardEl) cardEl.dataset.color = color;
  }
}

function setSelectedSize(size) {
  selectedSize = size;
  sizePicker.querySelectorAll('.size-swatch').forEach(btn => {
    btn.classList.toggle('is-selected', btn.dataset.size === size);
  });

  const name = nameInput.value.trim();
  const willOverflow = !!name && nameExceedsLimit(name, size);

  // 若是編輯既有習慣，即時更新對應卡片的大小──
  // 但如果切換後名稱會超出新尺寸的字數上限，先不要真的套用外觀變化，
  // 避免卡片在尚未確認儲存前，短暫出現標題跟把手或編輯鈕重疊的畫面
  if (editingId !== null) {
    const cardEl = document.getElementById(`card-${editingId}`);
    if (cardEl && !willOverflow) {
      cardEl.classList.toggle('is-large', size === 'large');
      cardEl.classList.toggle('is-small', size === 'small');
    }
  }

  if (willOverflow) {
    nameError.textContent = size === 'small'
      ? '名稱太長了，小卡片裝不下，請縮短名稱或改選大卡片'
      : '名稱太長了，請輸入更簡短的名稱';
    nameError.classList.remove('hide');
  } else {
    nameError.classList.add('hide');
  }
}

colorPicker.addEventListener('click', (e) => {
  const btn = e.target.closest('.color-swatch');
  if (!btn) return;
  setSelectedColor(btn.dataset.color);
});

sizePicker.addEventListener('click', (e) => {
  const btn = e.target.closest('.size-swatch');
  if (!btn) return;
  setSelectedSize(btn.dataset.size);
});

cancelBtn.addEventListener('click', () => {
  // 取消時，若編輯過程中曾即時預覽過顏色或大小，要把卡片還原成原本的樣子
  if (editingId !== null) {
    const cardEl = document.getElementById(`card-${editingId}`);
    if (cardEl) {
      cardEl.dataset.color = originalColor;
      cardEl.classList.toggle('is-large', originalSize === 'large');
      cardEl.classList.toggle('is-small', originalSize === 'small');
    }
  }
  overlay.classList.add('hide');
});

deleteBtn.addEventListener('click', () => {
  if (editingId === null) return;
  habits = habits.filter(h => h.id !== editingId);
  saveHabits();
  renderHabits();
  overlay.classList.add('hide');
});

confirmBtn.addEventListener('click', () => {
  const name = nameInput.value.trim();
  const tooLong = !!name && nameExceedsLimit(name, selectedSize);
  nameError.classList.toggle('hide', !tooLong);

  const baseDaysRaw = baseDaysInput.value.trim();
  let baseDays = baseDaysRaw === '' ? 0 : parseInt(baseDaysRaw, 10);
  const baseDaysInvalid = isNaN(baseDays) || baseDays < 0;
  const baseDaysTooLarge = !baseDaysInvalid && baseDays > MAX_TOTAL_DAYS;
  baseDaysError.classList.toggle('hide', !(baseDaysInvalid || baseDaysTooLarge));
  if (baseDaysInvalid) baseDaysError.textContent = '基礎天數不能是負數，請輸入0或更大的數字';
  else if (baseDaysTooLarge) baseDaysError.textContent = '基礎天數過多，請輸入小一點的數字';

  if (!name || tooLong || baseDaysInvalid || baseDaysTooLarge) return;

  if (editingId !== null) {
    const habit = habits.find(h => h.id === editingId);
    if (habit) {
      habit.name = name;
      habit.color = selectedColor;
      habit.size = selectedSize;
      habit.baseDays = baseDays;
    }
  } else {
    habits.push({ id: Date.now(), name, color: selectedColor, size: selectedSize, baseDays, dates: [] });
  }
  saveHabits();
  renderHabits();
  overlay.classList.add('hide');
});

// ---- 拖曳排序（FLIP動畫 + 重疊面積判斷，邏輯與Toki一致） ----
let dragState = null;

function attachDragHandlers(card, id) {
  const handle = card.querySelector('.drag-handle');
  handle.addEventListener('pointerdown', (e) => {
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    e.preventDefault();
    startDrag(card, id, e.clientX, e.clientY, e.pointerId);
  });
}

function idFromCardEl(el) { return Number(el.dataset.id); }

function elFromId(id) {
  if (dragState && id === dragState.id) return dragState.placeholder;
  return document.getElementById(`card-${id}`);
}

function sizeOfId(tid) {
  const el = elFromId(tid);
  return (el && el.classList.contains('is-large')) ? 'large' : 'small';
}

function findRowBounds(order, targetId) {
  let i = 0;
  while (i < order.length) {
    if (sizeOfId(order[i]) === 'large') {
      if (order[i] === targetId) return [i, i];
      i += 1;
      continue;
    }
    let end = i;
    if (i + 1 < order.length && sizeOfId(order[i + 1]) === 'small') end = i + 1;
    if (targetId === order[i] || (end > i && targetId === order[end])) return [i, end];
    i = end + 1;
  }
  return null;
}

function startDrag(card, id, startX, startY, pointerId) {
  const rect = card.getBoundingClientRect();
  const addCardEl = habitsContainer.querySelector('.add-card');

  const placeholder = document.createElement('div');
  placeholder.className = `card card-placeholder ${card.classList.contains('is-small') ? 'is-small' : 'is-large'}`;
  habitsContainer.insertBefore(placeholder, card);

  card.classList.add('dragging');
  card.style.width = rect.width + 'px';
  card.style.height = rect.height + 'px';
  card.style.left = rect.left + 'px';
  card.style.top = rect.top + 'px';

  try { card.setPointerCapture(pointerId); } catch (e) {}

  dragState = {
    id, card, placeholder, addCardEl, pointerId,
    offsetX: startX - rect.left,
    offsetY: startY - rect.top,
    liveOrder: habits.map(h => h.id),
    pendingAnimations: 0
  };

  document.addEventListener('pointermove', onDragMove);
  document.addEventListener('pointerup', onDragEnd);
  document.addEventListener('pointercancel', onDragEnd);
}

function reorderLiveDOM(order) {
  order.forEach(id => {
    if (dragState && id === dragState.id) {
      habitsContainer.insertBefore(dragState.placeholder, dragState.addCardEl);
    } else {
      const el = document.getElementById(`card-${id}`);
      if (el) habitsContainer.insertBefore(el, dragState.addCardEl);
    }
  });
}

function onDragMove(e) {
  if (!dragState) return;
  const { card, offsetX, offsetY, id } = dragState;

  card.style.left = (e.clientX - offsetX) + 'px';
  card.style.top = (e.clientY - offsetY) + 'px';

  if (dragState.pendingAnimations > 0) return;

  const others = Array.from(habitsContainer.querySelectorAll('.card:not(.add-card):not(.card-placeholder):not(.dragging)'));
  if (others.length === 0) return;

  const draggedRect = card.getBoundingClientRect();
  const draggedArea = draggedRect.width * draggedRect.height;

  let hoveredId = null, hoveredEl = null, maxArea = 0;
  others.forEach(c => {
    const r = c.getBoundingClientRect();
    const overlapW = Math.min(draggedRect.right, r.right) - Math.max(draggedRect.left, r.left);
    const overlapH = Math.min(draggedRect.bottom, r.bottom) - Math.max(draggedRect.top, r.top);
    const area = (overlapW > 0 && overlapH > 0) ? overlapW * overlapH : 0;
    const threshold = Math.min(draggedArea, r.width * r.height) * 0.12;
    if (area > threshold && area > maxArea) { maxArea = area; hoveredId = idFromCardEl(c); hoveredEl = c; }
  });

  if (hoveredId === null) {
    let closestDist = Infinity;
    others.forEach(c => {
      const r = c.getBoundingClientRect();
      const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
      const dist = Math.hypot(e.clientX - cx, e.clientY - cy);
      if (dist < closestDist) { closestDist = dist; hoveredId = idFromCardEl(c); hoveredEl = c; }
    });
  }
  if (hoveredId === null) return;

  const hoveredRect = hoveredEl.getBoundingClientRect();
  let insertBefore;
  if (card.classList.contains('is-large') || hoveredEl.classList.contains('is-large')) {
    const dCy = draggedRect.top + draggedRect.height / 2;
    const hCy = hoveredRect.top + hoveredRect.height / 2;
    insertBefore = dCy < hCy;
  } else {
    const dCx = draggedRect.left + draggedRect.width / 2;
    const hCx = hoveredRect.left + hoveredRect.width / 2;
    insertBefore = dCx < hCx;
  }

  const withoutDragged = dragState.liveOrder.filter(i => i !== id);
  const hoveredIndex = withoutDragged.indexOf(hoveredId);
  if (hoveredIndex === -1) return;

  let insertAt = insertBefore ? hoveredIndex : hoveredIndex + 1;
  const draggedIsLarge = card.classList.contains('is-large');
  const hoveredIsSmall = !hoveredEl.classList.contains('is-large');
  if (draggedIsLarge && hoveredIsSmall) {
    const bounds = findRowBounds(withoutDragged, hoveredId);
    if (bounds) insertAt = insertBefore ? bounds[0] : bounds[1] + 1;
  }

  const newLiveOrder = withoutDragged.slice();
  newLiveOrder.splice(insertAt, 0, id);
  if (newLiveOrder.join(',') === dragState.liveOrder.join(',')) return;

  const trackedIds = dragState.liveOrder;
  const firstRects = new Map();
  trackedIds.forEach(tid => {
    const el = elFromId(tid);
    if (el) firstRects.set(tid, el.getBoundingClientRect());
  });

  dragState.liveOrder = newLiveOrder;
  reorderLiveDOM(newLiveOrder);

  newLiveOrder.forEach(tid => {
    const el = elFromId(tid);
    const first = firstRects.get(tid);
    if (!el || !first) return;
    const last = el.getBoundingClientRect();
    const dx = first.left - last.left, dy = first.top - last.top;
    if (dx || dy) {
      dragState.pendingAnimations++;
      let settled = false;
      const markSettled = () => {
        if (settled) return;
        settled = true;
        if (dragState) dragState.pendingAnimations = Math.max(0, dragState.pendingAnimations - 1);
      };
      el.style.transition = 'none';
      el.style.transform = `translate(${dx}px, ${dy}px)`;
      requestAnimationFrame(() => {
        el.style.transition = 'transform 0.22s ease';
        el.style.transform = '';
        el.addEventListener('transitionend', markSettled, { once: true });
        setTimeout(markSettled, 260);
      });
    }
  });
}

function onDragEnd() {
  if (!dragState) return;
  const { card, placeholder, id, liveOrder } = dragState;

  document.removeEventListener('pointermove', onDragMove);
  document.removeEventListener('pointerup', onDragEnd);
  document.removeEventListener('pointercancel', onDragEnd);

  const floatingRect = card.getBoundingClientRect();
  habitsContainer.insertBefore(card, placeholder);
  placeholder.remove();

  card.classList.remove('dragging');
  card.style.width = '';
  card.style.height = '';
  card.style.left = '';
  card.style.top = '';

  const settledRect = card.getBoundingClientRect();
  const dx = floatingRect.left - settledRect.left, dy = floatingRect.top - settledRect.top;
  card.style.transition = 'none';
  card.style.transform = `translate(${dx}px, ${dy}px) scale(1.03)`;
  requestAnimationFrame(() => {
    card.style.transition = 'transform 0.25s ease';
    card.style.transform = '';
    const cleanup = () => { card.style.transition = ''; card.style.transform = ''; };
    card.addEventListener('transitionend', cleanup, { once: true });
    setTimeout(cleanup, 280);
  });

  const idToHabit = new Map(habits.map(h => [h.id, h]));
  habits = liveOrder.map(tid => idToHabit.get(tid)).filter(Boolean);
  saveHabits();

  dragState = null;
}

renderHabits();

// ---- 深淺色模式 ----
const root = document.documentElement;
const themeToggle = document.getElementById('themeToggle');

function getEffectiveTheme() {
  const explicit = root.getAttribute('data-theme');
  if (explicit) return explicit;
  return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
}
function updateToggleUI() { themeToggle.classList.toggle('is-light', getEffectiveTheme() === 'light'); }

try {
  const savedTheme = localStorage.getItem(THEME_KEY);
  if (savedTheme === 'light' || savedTheme === 'dark') root.setAttribute('data-theme', savedTheme);
} catch (e) {}

themeToggle.addEventListener('click', () => {
  const next = getEffectiveTheme() === 'light' ? 'dark' : 'light';
  root.setAttribute('data-theme', next);
  try { localStorage.setItem(THEME_KEY, next); } catch (e) {}
  updateToggleUI();
});

window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', () => {
  if (!root.getAttribute('data-theme')) updateToggleUI();
});

updateToggleUI();
</script>

</body>
</html>
